<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background: black;\n            margin: 0;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="600"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n        let paddleWidth = 10;\n        let paddleHeight = 100;\n        let player = {\n            x: 0,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            playerScore: 0\n        };\n        let computer = {\n            x: canvas.width - paddleWidth,\n            y: canvas.height / 2 - paddleHeight / 2,\n            width: paddleWidth,\n            height: paddleHeight,\n            color: 'white',\n            playerScore: 0\n        };\n        let ball = {\n            x: canvas.width / 2,\n            y: canvas.height / 2,\n            radius: 10,\n            speed: 4,\n            velocityX: 4,\n            velocityY: 4,\n            color: 'white'\n        };\n        function drawRect(x, y, w, h, color) {\n            context.fillStyle = color;\n            context.fillRect(x, y, w, h);\n        }\n        function drawArc(x, y, r, color) {\n            context.fillStyle = color;\n            context.beginPath();\n            context.arc(x, y, r, 0, Math.PI * 2, false);\n            context.closePath();\n            context.fill();\n        }\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.velocityX = 4;\n            ball.velocityY = 4;\n        }\n        function update() {\n            ball.x += ball.velocityX;\n            ball.y += ball.velocityY;\n            if (ball.y + ball.radius >= canvas.height || ball.y - ball.radius <= 0) {\n                ball.velocityY = -ball.velocityY;\n            }\n            let player paddle = player.y;\n            let computer paddle = computer.y;\n            if (ball.x - ball.radius < player.x + player.width && ball.y + ball.radius > player paddle && ball.y - ball.radius < player paddle + player.height) {\n                ball.velocityX = -ball.velocityX;\n            } else if (ball.x + ball.radius > computer.x && ball.y + ball.radius > computer paddle && ball.y - ball.radius < computer paddle + computer.height) {\n                ball.velocityX = -ball.velocityX;\n            }\n            if (ball.x - ball.radius < 0) {\n                computer.playerScore++;\n                resetBall();\n            } else if (ball.x + ball.radius > canvas.width) {\n                player.playerScore++;\n                resetBall();\n            }\n        }\n        function draw() {\n            drawRect(0, 0, canvas.width, canvas.height, 'black');\n            drawRect(player.x, player.y, player.width, player.height, player.color);\n            drawRect(computer.x, computer.y, computer.width, computer.height, computer.color);\n            drawArc(ball.x, ball.y, ball.radius, ball.color);\n            context.font = '50px Arial';\n            context.fillStyle = 'white';\n            context.fillText(player.playerScore, canvas.width / 4, canvas.height / 5);\n            context.fillText(computer.playerScore, (3 * canvas.width) / 4, canvas.height / 5);\n        }\n        function game() {\n            update();\n            draw();\n        }\n        document.addEventListener('mousemove', (event) => {\n            let rect = canvas.getBoundingClientRect();\n            player.y = event.clientY - rect.top - player.height / 2;\n        });\n        setInterval(game, 1000 / 60);\n    </script>\n</body>\n</html>\n
